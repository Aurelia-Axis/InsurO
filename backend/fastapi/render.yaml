services:
  - type: web
    name: insureo-fastapi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POSTGRES_URL
        value: sqlite+aiosqlite:///./insureo.db
      - key: MONGO_URL
        value: mongodb://localhost:27017
